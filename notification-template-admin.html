<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Booking Request &mdash; Admin Notification</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf8f5;
      --text: #1a1817;
      --text-muted: #7a726a;
      --accent: #b8944a;
      --border: #e5ddd1;
      --section-alt: #f3efe8;
      --font-heading: Georgia, 'Times New Roman', serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      max-width: 520px;
      width: 100%;
      border-radius: 20px;
      padding: 36px 32px 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
    }
    .icon { font-size: 2.5rem; margin-bottom: 12px; text-align: center; }
    h1 {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 6px;
    }
    .sub {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .details {
      background: var(--section-alt);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .details .row {
      display: flex;
      gap: 8px;
      padding: 6px 0;
      font-size: 0.88rem;
    }
    .details .label {
      color: var(--text-muted);
      min-width: 90px;
      flex-shrink: 0;
    }
    .details .value { color: var(--text); word-break: break-word; }
    .details .divider { height: 1px; background: var(--border); margin: 8px 0; }
    .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      text-align: center;
      transition: all 0.2s ease;
    }
    .btn-primary { background: var(--accent); color: #fff; border: none; }
    .btn-primary:hover { background: #a38340; }
    .btn-outline {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { border-color: #bbb; color: var(--text); }
    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#x1f514;</div>
    <h1>New booking request</h1>
    <p class="sub">A visitor has submitted a coaching inquiry.</p>

    <div class="details">
      <div class="row"><span class="label">Name</span><span class="value">{{name}}</span></div>
      <div class="row"><span class="label">Email</span><span class="value">{{email}}</span></div>
      <div class="row"><span class="label">Phone</span><span class="value">{{phone}}</span></div>
      <div class="row"><span class="label">Social</span><span class="value">{{social}}</span></div>
      <div class="divider"></div>
      <div class="row"><span class="label">Preferred time</span><span class="value">{{preferredTime}}</span></div>
      <div class="row"><span class="label">Country / TZ</span><span class="value">{{countryTz}}</span></div>
      <div class="divider"></div>
      <div class="row"><span class="label">Message</span><span class="value">{{message}}</span></div>
    </div>

    <div class="actions">
      <a href="{{adminUrl}}" class="btn btn-primary">Open admin panel</a>
      <a href="mailto:{{email}}" class="btn btn-outline">Reply via email</a>
    </div>

    <p class="footer-note">Received {{date}} &middot; Matias Life Coach</p>
  </div>
</body>
</html>
