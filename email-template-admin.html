<!--
  ═══════════════════════════════════════════════════════════════
  EMAILJS TEMPLATE — Admin Notification
  ═══════════════════════════════════════════════════════════════
  Copy this into a NEW EmailJS template, NOT the same one used
  for the visitor confirmation email.

  IMPORTANT:
  1. Go to https://dashboard.emailjs.com/templates → Create New Template
  2. Click the </> CODE button before pasting
  3. Delete everything in the editor
  4. Paste this entire HTML
  5. Settings:
     - To Email: {{to_email}}
     - Subject:  {{subject}}
  6. Save and copy the new Template ID
  7. Replace EMAILJS_ADMIN_TEMPLATE_ID in index.html with this new ID
-->
<div style="font-family:'Inter',system-ui,sans-serif;font-size:14px;color:#1a1817;background:#faf8f5;padding:24px 12px">
  <div style="max-width:560px;margin:auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.05)">
    <div style="padding:32px 32px 0">
      <div style="border-bottom:2px solid #f3efe8;padding-bottom:20px;margin-bottom:24px">
        <span style="font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;font-weight:600;color:#1a1817">Matias Dopierala Zawada</span>
        <span style="font-size:11px;display:block;color:#b8944a;text-transform:uppercase;letter-spacing:0.12em;margin-top:-2px">Lifecoach</span>
      </div>
      <p style="font-size:15px;line-height:1.6;color:#1a1817;font-weight:600">New booking request</p>
      <table style="width:100%;border-collapse:collapse;margin:16px 0;font-size:13px">
        <tr><td style="padding:8px 12px;background:#faf8f5;color:#7a726a;width:100px">Name</td><td style="padding:8px 12px;color:#1a1817">{{name}}</td></tr>
        <tr><td style="padding:8px 12px;background:#faf8f5;color:#7a726a">Email</td><td style="padding:8px 12px;color:#1a1817">{{to_email}}</td></tr>
        <tr><td style="padding:8px 12px;background:#faf8f5;color:#7a726a">Phone</td><td style="padding:8px 12px;color:#1a1817">{{phone}}</td></tr>
        <tr><td style="padding:8px 12px;background:#faf8f5;color:#7a726a">Social</td><td style="padding:8px 12px;color:#1a1817">{{social}}</td></tr>
        <tr><td style="padding:8px 12px;background:#faf8f5;color:#7a726a">Preferred time</td><td style="padding:8px 12px;color:#1a1817">{{preferredTime}}</td></tr>
        <tr><td style="padding:8px 12px;background:#faf8f5;color:#7a726a">Country / TZ</td><td style="padding:8px 12px;color:#1a1817">{{countryTz}}</td></tr>
        <tr><td style="padding:8px 12px;background:#faf8f5;color:#7a726a;vertical-align:top">Message</td><td style="padding:8px 12px;color:#1a1817">{{message}}</td></tr>
      </table>
    </div>
    <div style="background:#f3efe8;padding:20px 32px;text-align:center">
      <p style="font-size:12px;color:#7a726a;margin:0">
        Log in to the <a href="https://madopierala-jpg.github.io/MatiasLifeCoach/" style="color:#b8944a;text-decoration:none;font-weight:500">admin panel</a> to manage this submission.
      </p>
    </div>
  </div>
</div>
